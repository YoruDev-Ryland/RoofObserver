name: Build Installer

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Existing version tag to build and release (for example v1.0.0)
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag="${{ github.event.inputs.tag }}"
            release_name="Release $tag"
            prerelease=false
            make_latest=true
          else
            if [[ "${GITHUB_REF_TYPE}" == "branch" ]]; then
              tag="edge"
              release_name="Edge Build"
              prerelease=true
              make_latest=false
            else
              tag="${GITHUB_REF_NAME}"
              release_name="Release $tag"
              prerelease=false
              make_latest=true
            fi
          fi

          if [[ "$tag" != "edge" && ! "$tag" =~ ^v[0-9] ]]; then
            echo "Release tag must look like v1.0.0" >&2
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "release_name=$release_name" >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"
          echo "make_latest=$make_latest" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout requested tag
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          git fetch --force --tags origin
          git checkout "refs/tags/${{ steps.release.outputs.tag }}"

      - name: Update rolling edge tag
        if: github.ref_type == 'branch'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f edge "${GITHUB_SHA}"
          git push origin refs/tags/edge --force

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Install NSSM
        shell: pwsh
        run: |
          choco install nssm --no-progress -y
          $packageRoot = Join-Path $env:ChocolateyInstall 'lib\nssm'
          $nssmPath = Get-ChildItem $packageRoot -Recurse -Filter nssm.exe |
            Where-Object { $_.FullName -notlike '*\bin\nssm.exe' } |
            Sort-Object FullName -Descending |
            Select-Object -First 1 -ExpandProperty FullName
          if (-not $nssmPath) {
            throw "real nssm.exe was not found under $packageRoot"
          }
          Write-Host "Using NSSM binary at $nssmPath"
          Copy-Item $nssmPath .\nssm.exe -Force

      - name: Build executables with PyInstaller
        run: |
          pyinstaller --onefile --collect-all tzdata --name roofobserver roofobserver.py
          pyinstaller --onefile --collect-all tzdata --name roofapi roofapi.py

      - name: Build installer with Inno Setup
        run: iscc installer.iss

      - name: Upload installer to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: ${{ steps.release.outputs.release_name }}
          prerelease: ${{ steps.release.outputs.prerelease }}
          make_latest: ${{ steps.release.outputs.make_latest }}
          files: Output/RoofObserverSetup.exe
          fail_on_unmatched_files: true
          generate_release_notes: true
          overwrite_files: true
